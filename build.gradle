// The top-level project is used to generate sources but not javadoc.

plugins {
    id 'java-library'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(22)
    }
}

// Disable jar for top-level project
tasks.named('jar') {
    enabled = false
}

// Disable javadoc generation
tasks.named('javadoc') {
    enabled = false
}

// Ensure all source code is generated
subprojects.forEach {
    tasks.named('generateSources') {
        dependsOn it.tasks.named('generateSources')
    }
}
